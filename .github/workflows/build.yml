# https://help.github.com/en/categories/automating-your-workflow-with-github-actions

name: "Build"

on:
  pull_request:
  push:
    branches:
      - "1.x"

jobs:
  lint:
    name: "Lint"
    runs-on: "ubuntu-latest"

    strategy:
      fail-fast: false
      matrix:
        php-version:
          - "8.2"
          - "8.3"
          - "8.4"
          - "8.5"

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Install PHP"
        uses: "shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc" # v2
        with:
          coverage: "none"
          php-version: "${{ matrix.php-version }}"
          ini-file: development
          extensions: "mongodb"

      - name: "Validate Composer"
        run: "composer validate"

      - name: "Allow installing on PHP 8.4"
        if: matrix.php-version == '8.4'
        run: "composer config platform.php 8.3.99"

      - name: "Allow installing on PHP 8.5"
        if: matrix.php-version == '8.5'
        run: "composer config platform.php 8.4.99"

      - name: "Install dependencies"
        run: "composer install --no-interaction --no-progress"

      - name: "Lint"
        run: "make lint"

  coding-standard:
    name: "Coding Standard"

    runs-on: "ubuntu-latest"

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Checkout build-cs"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: "phpstan/build-cs"
          path: "build-cs"
          ref: "2.x"

      - name: "Install PHP"
        uses: "shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc" # v2
        with:
          coverage: "none"
          php-version: "8.2"
          ini-file: development

      - name: "Validate Composer"
        run: "composer validate"

      - name: "Install dependencies"
        run: "composer install --no-interaction --no-progress"

      - name: "Install build-cs dependencies"
        working-directory: "build-cs"
        run: "composer install --no-interaction --no-progress"

      - name: "Lint"
        run: "make lint"

      - name: "Coding Standard"
        run: "make cs"

  tests:
    name: "Tests"
    runs-on: "ubuntu-latest"

    strategy:
      fail-fast: false
      matrix:
        php-version:
          - "8.2"
          - "8.3"
          - "8.4"
          - "8.5"

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Install PHP"
        uses: "shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc" # v2
        with:
          coverage: "xdebug"
          php-version: "${{ matrix.php-version }}"
          ini-file: development
          extensions: "mongodb"

      - name: "Allow installing on PHP 8.4"
        if: matrix.php-version == '8.4'
        run: "composer config platform.php 8.3.99"

      - name: "Allow installing on PHP 8.5"
        if: matrix.php-version == '8.5'
        run: "composer config platform.php 8.4.99"

      - name: "Install dependencies"
        run: "composer install --no-interaction --no-progress"

      - name: "Tests"
        run: "make tests"

  static-analysis:
    name: "PHPStan"
    runs-on: "ubuntu-latest"

    strategy:
      fail-fast: false
      matrix:
        php-version:
          - "8.2"
          - "8.3"
          - "8.4"
          - "8.5"

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Install PHP"
        uses: "shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc" # v2
        with:
          coverage: "none"
          php-version: "${{ matrix.php-version }}"
          ini-file: development

      - name: "Allow installing on PHP 8.5"
        if: matrix.php-version == '8.5'
        run: "composer config platform.php 8.4.99"

      - name: "Install dependencies"
        run: "composer install --no-interaction --no-progress"

      - name: "PHPStan"
        run: "make phpstan"

  mutation-tests:
    name: "Mutation tests"
    runs-on: "ubuntu-latest"
    needs:
      - tests
      - static-analysis

    strategy:
      fail-fast: false
      matrix:
        php-version:
          - "8.2"
          - "8.3"
          - "8.4"

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-php
        with:
          php-version: "${{ matrix.php-version }}"
          build-infection-path: "./"

      - name: "Install dependencies"
        run: "composer install --no-interaction --no-progress"

      - name: "Restore result cache"
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ./tmp
          key: "repo-result-cache-v1-${{ matrix.php-version }}-${{ github.run_id }}"
          restore-keys: |
            repo-result-cache-v1-${{ matrix.php-version }}-

      - name: "Run infection"
        run: |
          infection \
            --ignore-msi-with-no-mutations \
            --log-verbosity=all \
            --logger-text=php://stdout

      - name: "Save result cache"
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        if: ${{ !cancelled() }}
        with:
          path: ./tmp
          key: "repo-result-cache-v1-${{ matrix.php-version }}-${{ github.run_id }}"
